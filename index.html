// ============================================================
// TIMER COMPONENT
// ============================================================
function Timer({ seconds, isRunning }) {
  const isOvertime = seconds <= 0;
  const isWarning = !isOvertime && seconds <= 600; // 10 minutes
  const absSeconds = Math.abs(seconds);
  const mins = Math.floor(absSeconds / 60);
  const secs = absSeconds % 60;
  const display = `${isOvertime ? "+" : ""}${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;

  const timerStyle = {
    ...S.timer,
    ...(isOvertime ? S.timerRed : {}),
    ...(isWarning ? S.timerWarning : {}),
  };

  return (
    <div style={timerStyle}>
      {display}
      {isWarning && (
        <div style={S.warningMsg}>Si se acaba el tiempo, podés seguir sin problema.</div>
      )}
      {isOvertime && seconds <= -5 && (
        <div style={S.overtimeMsg}>Tiempo sugerido terminado</div>
      )}
    </div>
  );
}

// ============================================================
function OptionCard({ option, selectionState, onClick }) {
  const [hovered, setHovered] = useState(false);
  const isFirst = selectionState === 1;
  const isSecond = selectionState === 2;
  const isSelected = isFirst || isSecond;

  const baseStyle = {
    ...S.option,
    ...(isFirst ? S.optionFirst : {}),
    ...(isSecond ? S.optionSecond : {}),
    ...(hovered && !isSelected ? S.optionHover : {}),
  };

  return (
    <div
      style={baseStyle}
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      {isSelected && (
        <div style={{ ...S.badge, ...(isFirst ? S.badgeFirst : S.badgeSecond) }}>
          {selectionState}
        </div>
      )}
      <span style={{ fontWeight: 600, marginRight: 8, color: "#1a1a1a" }}>{option.letter}.</span>
      {option.text}
    </div>
  );
}

// ============================================================
function ScenarioScreen({ scenario, index, total, onConfirm }) {
  const [first, setFirst] = useState(null);
  const [second, setSecond] = useState(null);
  const [followUpText, setFollowUpText] = useState("");
  const startTime = useRef(Date.now());

  const handleClick = (letter) => {
    if (letter === first) {
      setFirst(null);
      setSecond(null);
      return;
    }
    if (letter === second) {
      setSecond(null);
      return;
    }
    if (!first) {
      setFirst(letter);
    } else if (!second) {
      setSecond(letter);
    }
  };

  const getSelectionState = (letter) => {
    if (letter === first) return 1;
    if (letter === second) return 2;
    return 0;
  };

  const canConfirm = first && second && (!scenario.followUp || followUpText.trim().length > 0);

  const instruction = !first
    ? "Elegí la opción que más te representa"
    : !second
    ? "Ahora elegí la segunda que más te representa"
    : scenario.followUp && !followUpText.trim()
    ? "Respondé la pregunta breve debajo"
    : "";

  const handleConfirm = () => {
    if (!canConfirm) return;
    const elapsed = Math.round((Date.now() - startTime.current) / 1000);
    onConfirm({
      scenarioId: scenario.id,
      first,
      second,
      followUpResponse: scenario.followUp ? followUpText.trim() : null,
      timeSpent: elapsed
    });
  };

  return (
    <div style={S.container}>
      <div style={{ marginTop: 64, marginBottom: 32 }}>
        <p style={{ fontSize: 12, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, fontWeight: 500 }}>
          Escenario {index + 1}
        </p>

        <div style={S.scenarioCase}>
          <p style={{ margin: 0, fontSize: 15, lineHeight: 1.75, color: "#333" }}>{scenario.case}</p>
        </div>

        <p style={{ fontSize: 15, fontWeight: 600, color: "#1a1a1a", marginBottom: 20 }}>{scenario.question}</p>

        {instruction && (
          <p style={S.instruction}>{instruction}</p>
        )}

        <div>
          {scenario.options.map(opt => (
            <OptionCard
              key={opt.letter}
              option={opt}
              selectionState={getSelectionState(opt.letter)}
              onClick={() => handleClick(opt.letter)}
            />
          ))}
        </div>

        {scenario.followUp && second && (
          <div style={S.followUp}>
            <p style={{ fontSize: 14, fontWeight: 600, color: "#1a1a1a", margin: 0 }}>
              {scenario.followUp.question}
            </p>
            <textarea
              style={S.textarea}
              value={followUpText}
              onChange={e => setFollowUpText(e.target.value)}
              placeholder="Escribí tu respuesta..."
              rows={3}
            />
          </div>
        )}

        <button
          style={{ ...S.btn, ...(canConfirm ? {} : S.btnDisabled), marginTop: 24, marginBottom: 48 }}
          onClick={handleConfirm}
          disabled={!canConfirm}
        >
          Confirmar y continuar
        </button>
      </div>
    </div>
  );
}

  const [responses, setResponses] = useState([]);
  const [timerSeconds, setTimerSeconds] = useState(CONFIG.timerSeconds);
  const [timerRunning, setTimerRunning] = useState(false);
  const [submitStatus, setSubmitStatus] = useState(null);
  const timerRef = useRef(null);
  const timerStartRef = useRef(null);

  // Shuffle scenarios on mount
  useEffect(() => {
    const shuffled = [...CONFIG.scenarios]
      .map(s => ({ ...s, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort)
      .map(({ sort, ...s }) => s);
    setScenarioOrder(shuffled);
  }, []);

  // Timer logic — uses Date.now() so background tabs don't drift
  useEffect(() => {
    if (timerRunning) {
      if (!timerStartRef.current) timerStartRef.current = Date.now();
      timerRef.current = setInterval(() => {
        const elapsed = Math.round((Date.now() - timerStartRef.current) / 1000);
        setTimerSeconds(CONFIG.timerSeconds - elapsed);
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [timerRunning]);

  const handleStartWelcome = () => setScreen("data");

  const handleDataSubmit = (data) => {
    setCandidateData(data);
    setScreen("scenarios");
    setTimerRunning(true);
    // Register that the candidate started
    try {
      fetch(CONFIG.sheetEndpoint, {
        method: "POST",
        body: JSON.stringify({
          type: "started",
          candidate: data,
          startedAt: new Date().toISOString()
        })
      });
    } catch (e) { /* silent - don't block the test */ }
  };

  const handleConfirmScenario = (response) => {
    const newResponses = [...responses, response];
    setResponses(newResponses);

    if (currentIndex < scenarioOrder.length - 1) {
      setCurrentIndex(prev => prev + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setTimerRunning(false);
      const totalTime = Math.round((Date.now() - timerStartRef.current) / 1000);
      const payload = {
        candidate: candidateData,
        responses: newResponses,
        totalTimeSeconds: totalTime,
        overtime: totalTime > CONFIG.timerSeconds ? totalTime - CONFIG.timerSeconds : 0,
        completedAt: new Date().toISOString()
      };

      // Send to Google Sheet
      setSubmitStatus("sending");
      setScreen("close");

      fetch(CONFIG.sheetEndpoint, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
        .then(() => {
          setSubmitStatus("success");
        })
        .catch((err) => {
          console.error("Error sending results:", err);
          setSubmitStatus("error");
        });
    }
  };

  const role = CONFIG.role;

  return (
    <div style={S.app}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #1a1a1a; color: #fff; }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        input:focus, select:focus, textarea:focus {
          border-color: #1a1a1a !important;
        }
      `}</style>

      {screen === "scenarios" && (
        <>
          <Timer seconds={timerSeconds} isRunning={timerRunning} />
          <div style={S.progress}>
            {currentIndex + 1} / {scenarioOrder.length}
          </div>
        </>
      )}

      {screen === "welcome" && (
        <WelcomeScreen onStart={handleStartWelcome} role={role} />
      )}
      {screen === "data" && (
        <DataScreen onSubmit={handleDataSubmit} role={role} />
      )}
      {screen === "scenarios" && scenarioOrder.length > 0 && (
        <ScenarioScreen
          key={scenarioOrder[currentIndex].id}
          scenario={scenarioOrder[currentIndex]}
          index={currentIndex}
          total={scenarioOrder.length}
          onConfirm={handleConfirmScenario}
        />
      )}
      {screen === "close" && (
        <CloseScreen status={submitStatus} />
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
    </script>
</body>
</html>
